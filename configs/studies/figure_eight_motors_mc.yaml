# Monte Carlo: elevated figure-eight, fixed hover LQR, motor plant + propulsion scatter.
# Plant: mixer + first-order motors. Controller designed on nominal vehicle only.
schema_version: 1
study_id: figure_eight_motors_mc
seed: 42

vehicle: configs/vehicles/default_quadrotor.yaml

controller:
  type: lqr_hover
  Q_diag: [100, 100, 100, 10, 10, 1, 10, 10, 10, 1, 1, 0.1]
  R_diag: [0.1, 1.0, 1.0, 1.0]

guidance:
  type: waypoints
  mission_file: configs/missions/figure_eight.yaml
  method: auto
  yaw_mode: constant
  sample_dt_s: 0.01
  fail_on_infeasible: false

sim:
  dt_s: 0.01
  method: rk45
  rtol: 1.0e-5
  atol: 1.0e-7
  attitude: euler
  plant: motors

metrics:
  position_bound_m: 0.75

monte_carlo:
  enabled: true
  n_trials: 40
  backend: local
  shards: 1
  redesign_controller: false
  mass_rel_sigma: 0.10
  inertia_rel_sigma: 0.10
  arm_rel_sigma: 0.05
  ct_rel_sigma: 0.08
  cq_rel_sigma: 0.10
  motor_tau_rel_sigma: 0.15
  omega_max_rel_sigma: 0.08
