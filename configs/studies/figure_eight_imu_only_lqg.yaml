# GPS-denied honesty case: rate gyro only. Position is not observable from
# body rates alone under this hover-linear KF — expect drift / soft failure.
# Docs and showcase label this explicitly; contrast with figure_eight_ahrs_lqg.
schema_version: 1
study_id: figure_eight_imu_only_lqg
seed: 7

vehicle: configs/vehicles/default_quadrotor.yaml

controller:
  type: lqr_hover
  Q_diag: [100, 100, 100, 10, 10, 1, 10, 10, 10, 1, 1, 0.1]
  R_diag: [0.1, 1.0, 1.0, 1.0]

guidance:
  type: waypoints
  mission_file: configs/missions/figure_eight.yaml
  method: auto
  yaw_mode: constant
  sample_dt_s: 0.01
  fail_on_infeasible: false

sim:
  dt_s: 0.01
  method: rk45
  rtol: 1.0e-5
  atol: 1.0e-7
  attitude: euler
  observer:
    type: linear_kf
    seed: 7
    pos_sigma_m: 0.05
    vel_sigma_m_s: 0.05
    att_sigma_rad: 0.03
    omega_sigma_rad_s: 0.04
    process_sigma: 0.03
    channels: [omega]

metrics:
  position_bound_m: 2.0
