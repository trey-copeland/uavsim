schema_version: 1
study_id: hover_nominal
seed: 0

vehicle: configs/vehicles/default_quadrotor.yaml

controller:
  type: lqr_hover
  # Heritage-inspired defaults (position/altitude priority)
  Q_diag: [100, 100, 100, 10, 10, 1, 10, 10, 10, 1, 1, 0.1]
  R_diag: [0.1, 1.0, 1.0, 1.0]

guidance:
  type: hold
  # NED position setpoint [m]; z positive down — hover at 0 for Phase 1 demo
  position_ned_m: [0.0, 0.0, 0.0]
  yaw_rad: 0.0
  duration_s: 5.0

sim:
  dt_s: 0.01
  method: rk45
  rtol: 1.0e-6
  atol: 1.0e-8

metrics:
  position_bound_m: 0.1
