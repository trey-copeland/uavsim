# Low hover under Cheeseman–Bennett ground effect.
# At z=1.0 with ground_z=1.05, AGL≈0.05 m (h/R≈0.4) → κ well above 1.
schema_version: 1
study_id: hover_ground_effect
seed: 0

vehicle: configs/vehicles/default_quadrotor_ge.yaml

controller:
  type: lqr_hover
  Q_diag: [100, 100, 100, 10, 10, 1, 10, 10, 10, 1, 1, 0.1]
  R_diag: [0.1, 1.0, 1.0, 1.0]

guidance:
  type: waypoints
  mission_file: configs/missions/hover_hold.yaml
  method: interp
  yaw_mode: constant
  sample_dt_s: 0.01
  fail_on_infeasible: false

sim:
  dt_s: 0.01
  method: rk45
  rtol: 1.0e-5
  atol: 1.0e-7
  attitude: euler
  plant: wrench

metrics:
  position_bound_m: 0.5
