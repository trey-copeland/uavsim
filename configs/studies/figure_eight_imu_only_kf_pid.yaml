# GPS-denied honesty: rate gyro only → linear KF → PID. Position not observable.
# Pair with figure_eight_imu_only_lqg.
schema_version: 1
study_id: figure_eight_imu_only_kf_pid
seed: 7

vehicle: configs/vehicles/default_quadrotor.yaml

controller:
  type: pid_cascade
  kp_pos: [2.5, 2.5, 6.0]
  kd_pos: [2.0, 2.0, 3.5]
  kp_att: [8.0, 8.0, 2.0]
  kd_rate: [0.8, 0.8, 0.4]
  max_tilt_rad: 0.436

guidance:
  type: waypoints
  mission_file: configs/missions/figure_eight.yaml
  method: auto
  yaw_mode: constant
  sample_dt_s: 0.01
  fail_on_infeasible: false

sim:
  dt_s: 0.01
  method: rk45
  rtol: 1.0e-5
  atol: 1.0e-7
  attitude: euler
  observer:
    type: linear_kf
    seed: 7
    pos_sigma_m: 0.05
    vel_sigma_m_s: 0.05
    att_sigma_rad: 0.03
    omega_sigma_rad_s: 0.04
    process_sigma: 0.03
    channels: [omega]

metrics:
  position_bound_m: 2.0
