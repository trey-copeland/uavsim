# Monte Carlo on elevated figure-eight (showcase robustness demo).
# Default N is large for portfolio runs; CI should use --n-trials override or
# hover_mc_smoke. Uncertainty model aligns with heritage paper MC (±10% mass/inertia).
schema_version: 1
study_id: figure_eight_mc
seed: 42

vehicle: configs/vehicles/default_quadrotor.yaml

controller:
  type: lqr_hover
  Q_diag: [100, 100, 100, 10, 10, 1, 10, 10, 10, 1, 1, 0.1]
  R_diag: [0.1, 1.0, 1.0, 1.0]

guidance:
  type: waypoints
  mission_file: configs/missions/figure_eight.yaml
  method: auto
  yaw_mode: constant
  sample_dt_s: 0.01
  fail_on_infeasible: false

sim:
  dt_s: 0.01
  method: rk45
  rtol: 1.0e-5
  atol: 1.0e-7

metrics:
  position_bound_m: 0.5

monte_carlo:
  enabled: true
  n_trials: 200
  backend: local
  shards: 1
  # Design LQR on nominal; plant parameters are perturbed (heritage default)
  redesign_controller: false
  mass_rel_sigma: 0.10
  inertia_rel_sigma: 0.10
  arm_rel_sigma: 0.005
