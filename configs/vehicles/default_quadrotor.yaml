# Default 500 g class quadrotor (heritage ME590 scale)
schema_version: 1
vehicle_id: default_quadrotor

mass_kg: 0.5
gravity_m_s2: 9.81
arm_length_m: 0.25

inertia:
  ixx_kg_m2: 0.0075
  iyy_kg_m2: 0.0075
  izz_kg_m2: 0.013

# Actuator limits: thrust [N], body torques [N·m]
# Torque authority sized so LQR can recover from modest offsets without
# permanent saturation (heritage ±0.1 was too tight for these Q weights).
limits:
  thrust_min_n: 0.0
  thrust_max_n: 9.81          # 2 * m * g with m=0.5
  torque_max_nm: 1.0          # |τ| limit per axis

# Propulsion for mixer (D-8) + first-order motors (D-7); optional (code defaults).
# f = ct * ω² per motor; hover ω ≈ 600 rad/s for this mass with these ct.
propulsion:
  layout: x
  ct_n_s2: 3.405e-6
  cq_nm_s2: 5.4e-8
  motor_time_const_s: 0.05
  omega_min_rad_s: 0.0
  omega_max_rad_s: 1200.0

# Aero / environment (D-4/D-5 + ground effect). Defaults off → vacuum plant.
# Enable on a dedicated vehicle YAML for demos (see default_quadrotor_aero.yaml).
aero:
  drag_lin_ns_m: 0.0
  drag_quad_ns2_m2: 0.0
  rate_damp_nm_s: 0.0
  prop_h_s_per_m: 0.0
  ground_effect: none
  rotor_radius_m: 0.1
  ground_z_ned_m: 0.0
  ge_exp_a: 0.5
  ge_exp_b: 2.0
  ge_kappa_max: 3.0
