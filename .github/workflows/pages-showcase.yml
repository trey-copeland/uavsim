# Publish docs/showcase to the gh-pages branch (static React showpiece).
#
# Why not actions/deploy-pages?
#   configure-pages / deploy-pages require an existing Pages site with
#   source = "GitHub Actions". Fresh repos get HTTP 404 from the Pages API
#   ("Get Pages site failed") even with enablement: true in some cases.
#
# One-time UI step after the first green run:
#   Settings → Pages → Build and deployment
#     Source: Deploy from a branch
#     Branch: gh-pages / (root)
#   Site: https://trey-copeland.github.io/uavsim/
name: Pages showcase

on:
  push:
    branches: [main, master]
    paths:
      - "docs/showcase/**"
      - ".github/workflows/pages-showcase.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-showcase
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify showcase payload
        run: |
          set -euo pipefail
          test -f docs/showcase/index.html
          test -f docs/showcase/app.js
          test -f docs/showcase/styles.css
          test -f docs/showcase/data/showcase.json
          python3 -c "import json; d=json.load(open('docs/showcase/data/showcase.json')); assert d.get('runs')"
          echo "Showcase OK ($(wc -c < docs/showcase/data/showcase.json) bytes data)"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/showcase
          # Keep only the published tree (no history bloat).
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
