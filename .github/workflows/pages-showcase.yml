# Deploy docs/showcase as the GitHub Pages site (React portfolio showpiece).
name: Pages showcase

on:
  push:
    branches: [master, main]
    paths:
      - "docs/showcase/**"
      - ".github/workflows/pages-showcase.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-showcase
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/showcase

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
